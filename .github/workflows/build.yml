name: GarnetKernel Build

# ═══════════════════════════════════════════════════════════════════════════════
# GarnetKernel — Redmi Note 13 Pro 5G (garnet / 2312DRA50G)
# SoC : Snapdragon 7s Gen 2 (SM7435) — 4x Cortex-A78@2.4GHz + 4x A55@1.95GHz
# ROM : HyperOS 3.0.5 Global — Android 16 — GPU Adreno 710
#
# TOOLCHAIN: AOSP Clang r416183b (Clang 12.0.5)
#   → Exactamente el mismo que usa Wild Kernel 5.10.236 (funciona en garnet)
#   → ID: Android toolchain 7284624, based on r416183b
#   → Clang 20 / Neutron Clang 18 con -mcpu=cortex-a78 → bootloop silencioso
#
# ORDEN CRÍTICO DE PASOS:
#   1. Fuente GKI android12-5.10
#   2. SUSFS patch  ← PRIMERO (toca fs/open.c, fs/exec.c, etc.)
#   3. KSU hooks    ← DESPUÉS de SUSFS (mismo archivos, orden importa)
#   4. defconfig + build
# ═══════════════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ENABLE_LTO:
        description: 'Enable Thin LTO (true/false)'
        required: false
        default: 'true'
      ENABLE_SUSFS:
        description: 'Enable SUSFS (true/false)'
        required: false
        default: 'true'

env:
  KERNEL_REPO:   https://android.googlesource.com/kernel/common
  KERNEL_BRANCH: android12-5.10

  # KernelSU via WildKernels setup (gestiona hooks ARMv8.2 correctamente)
  KSU_SETUP_URL: https://raw.githubusercontent.com/WildKernels/GKI_KernelSU_SUSFS/main/setup_ksun.sh

  SUSFS_REPO:   https://gitlab.com/simonpunk/susfs4ksu.git
  SUSFS_BRANCH: gki-android12-5.10

  # AOSP Clang r416183b = Clang 12.0.5 = toolchain exacto de Wild Kernel
  AOSP_CLANG_REV: r416183b
  CLANG_DIR:      /home/runner/aosp-clang

  KERNEL_NAME:  GarnetKernel
  LOCALVERSION: -GarnetKernel

jobs:
  build:
    name: Build GarnetKernel
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: garnet-scripts

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio flex \
            git kmod libelf-dev libssl-dev python3 \
            zip curl wget ccache pahole zstd \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 8G
          key: garnet-gki-aosp-${{ env.AOSP_CLANG_REV }}-${{ github.ref_name }}
          restore-keys: |
            garnet-gki-aosp-${{ env.AOSP_CLANG_REV }}-
            garnet-gki-aosp-

      - name: Cache AOSP Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ env.CLANG_DIR }}
          key: aosp-clang-${{ env.AOSP_CLANG_REV }}-v1

      # AOSP Clang r416183b — Clang 12.0.5 — mismo que Wild Kernel 5.10.236
      - name: Download AOSP Clang r416183b
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ env.CLANG_DIR }}
          cd ${{ env.CLANG_DIR }}

          REV="${{ env.AOSP_CLANG_REV }}"
          echo "Downloading AOSP Clang $REV (Clang 12.0.5 — Wild Kernel toolchain)..."

          # URL principal: prebuilts AOSP desde rama android12-5.10
          URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-5.10/clang-${REV}.tar.gz"

          curl -L --retry 3 "$URL" -o clang.tar.gz && \
            tar -xzf clang.tar.gz && \
            rm clang.tar.gz && \
            echo "✅ AOSP Clang $REV extracted" || {

            echo "Primary URL failed — trying android12-stable branch..."
            URL2="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-stable/clang-${REV}.tar.gz"
            curl -L --retry 3 "$URL2" -o clang.tar.gz && \
              tar -xzf clang.tar.gz && \
              rm clang.tar.gz && \
              echo "✅ AOSP Clang $REV extracted (mirror)" || {

              echo "AOSP Clang unavailable — falling back to Neutron Clang (safe flags)"
              cd /tmp
              curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
              chmod +x antman
              # Instalar directamente en CLANG_DIR
              ./antman -S=latest
              # antman instala en el directorio actual — mover a CLANG_DIR
              mv neutron-clang/* ${{ env.CLANG_DIR }}/ 2>/dev/null || \
                rsync -a neutron-clang/ ${{ env.CLANG_DIR }}/ 2>/dev/null || \
                cp -r neutron-clang/* ${{ env.CLANG_DIR }}/ 2>/dev/null || true
              echo "✅ Neutron Clang (fallback) installed"
            }
          }

          # Verificar que clang existe en CLANG_DIR
          if [ ! -f "${{ env.CLANG_DIR }}/bin/clang" ]; then
            echo "❌ clang binary not found in ${{ env.CLANG_DIR }}/bin/"
            echo "Contents of CLANG_DIR:"
            find ${{ env.CLANG_DIR }} -name "clang" -o -name "clang-*" 2>/dev/null | head -5
            exit 1
          fi

          echo "✅ Toolchain ready:"
          ${{ env.CLANG_DIR }}/bin/clang --version

      - name: Export toolchain to PATH
        run: |
          echo "${{ env.CLANG_DIR }}/bin" >> $GITHUB_PATH
          echo "CLANG_PATH=${{ env.CLANG_DIR }}" >> $GITHUB_ENV
          clang --version

      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_REPO }} kernel
          cd kernel
          KHEAD=$(git rev-parse --short HEAD)
          echo "KERNEL_HEAD=$KHEAD" >> $GITHUB_ENV
          echo "✅ $KHEAD — $(git log --oneline -1)"

      # Fix STACKPROTECTOR_PER_TASK — causa bootloop con módulos Xiaomi en GKI 5.10
      - name: Apply GKI compatibility fixes
        run: |
          cd kernel
          if grep -q "default STACKPROTECTOR_STRONG" arch/arm64/Kconfig 2>/dev/null; then
            sed -i 's/default STACKPROTECTOR_STRONG/default n/' arch/arm64/Kconfig
            echo "✅ STACKPROTECTOR_PER_TASK: default → n"
          fi

      - name: Integrate KernelSU
        run: |
          cd kernel

          # Intentar WildKernels setup (gestiona hooks ARMv8.2 + SUSFS bridge)
          if curl -LSs --connect-timeout 10 "${{ env.KSU_SETUP_URL }}" -o /tmp/setup_ksun.sh 2>/dev/null \
             && [ -s /tmp/setup_ksun.sh ]; then
            bash /tmp/setup_ksun.sh
            echo "✅ WildKernels KSU setup applied"
          else
            echo "WildKernels setup unavailable — usando KernelSU-Next v3.1.0"
            curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
              | bash -s v3.1.0
          fi

          KSU_DIR=""
          [ -d "KernelSU-Next" ] && KSU_DIR="KernelSU-Next"
          [ -d "KernelSU" ]      && KSU_DIR="KernelSU"
          [ -z "$KSU_DIR" ] && echo "❌ KSU dir not found" && exit 1

          KSU_VER=$(cat "$KSU_DIR/VERSION" 2>/dev/null || echo "unknown")
          echo "KSU_VER=$KSU_VER" >> $GITHUB_ENV
          echo "KSU_DIR=$KSU_DIR" >> $GITHUB_ENV
          echo "✅ KSU ($KSU_DIR) — $KSU_VER"

      # SUSFS PRIMERO — modifica fs/open.c, fs/exec.c, fs/read_write.c, etc.
      # Los hooks KSU van DESPUÉS para no desplazar los offsets del patch SUSFS
      - name: Clone SUSFS
        if: ${{ github.event.inputs.ENABLE_SUSFS != 'false' }}
        run: |
          git clone --depth=1 -b ${{ env.SUSFS_BRANCH }} ${{ env.SUSFS_REPO }} susfs
          SUSFS_VER=$(cat susfs/VERSION 2>/dev/null || echo "v2.0.0")
          echo "SUSFS_VER=$SUSFS_VER" >> $GITHUB_ENV
          echo "✅ SUSFS $SUSFS_VER"

      - name: Apply SUSFS patch
        if: ${{ github.event.inputs.ENABLE_SUSFS != 'false' }}
        run: |
          cd kernel

          # Copiar todos los archivos SUSFS recursivamente
          find "$GITHUB_WORKSPACE/susfs/kernel_patches/include/" -name "*.h" | while read f; do
            dest="include/$(echo "$f" | sed 's|.*include/||')"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
          done
          find "$GITHUB_WORKSPACE/susfs/kernel_patches/fs/" -name "*.c" | while read f; do
            cp "$f" "fs/"
          done

          PATCH=""
          for c in \
            "$GITHUB_WORKSPACE/susfs/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch" \
            "$GITHUB_WORKSPACE/susfs/kernel_patches/50_add_susfs_in_kernel-5.10.patch"; do
            [ -f "$c" ] && PATCH="$c" && break
          done
          [ -z "$PATCH" ] && PATCH=$(find "$GITHUB_WORKSPACE/susfs/kernel_patches/" \
            -name "*5.10*.patch" 2>/dev/null | sort | head -1)
          [ -z "$PATCH" ] && echo "❌ SUSFS patch not found" && exit 1

          echo "Applying: $(basename "$PATCH")"
          if patch -p1 --forward < "$PATCH"; then
            echo "✅ SUSFS patch applied cleanly"
          else
            patch -p1 --forward --reject-file=/tmp/susfs.rej < "$PATCH" || true
            # Solo abortar si hay hunks realmente fallidos (no solo "Reversed")
            if find . -name "*.rej" | grep -q . && \
               grep -q "^---\|FAILED" /tmp/susfs.rej 2>/dev/null && \
               ! grep -q "Reversed" /tmp/susfs.rej 2>/dev/null; then
              echo "❌ SUSFS patch failed"
              cat /tmp/susfs.rej | head -60
              exit 1
            fi
            echo "⚠ SUSFS: minor conflicts resolved (Reversed = already applied)"
          fi

          # KSU bridge — ignorar si ya aplicado
          KSU_PATCH=$(find "$GITHUB_WORKSPACE/susfs/kernel_patches/" \
            \( -name "*ksu*" -o -name "*kernelsu*" \) 2>/dev/null | head -1)
          if [ -f "$KSU_PATCH" ] && [ -n "$KSU_DIR" ]; then
            ( cd "$KSU_DIR" && patch -p1 --forward < "$KSU_PATCH" 2>/dev/null ) && \
              echo "✅ KSU bridge applied" || echo "⚠ KSU bridge already applied (OK)"
          fi

      # KSU hooks manuales — DESPUÉS de SUSFS
      # Python evita problemas de escaping en YAML
      - name: Apply KSU manual hooks
        run: |
          python3 << 'PYEOF'
          import os, sys
          K = "kernel"

          def hook(rel, marker, search, decl, anchor, call):
              path = os.path.join(K, rel)
              if not os.path.isfile(path):
                  print(f"  SKIP {rel} (not found)")
                  return
              c = open(path).read()
              if marker in c:
                  print(f"  SKIP {rel} (already hooked)")
                  return
              if search not in c:
                  print(f"  WARN {rel}: anchor '{search[:30]}' not found")
                  return
              c = c.replace(search, decl + search, 1)
              if anchor in c:
                  c = c.replace(anchor, anchor + call, 1)
              else:
                  # fallback: insertar tras la primera llave de apertura
                  idx = c.find(search)
                  br  = c.find("{", idx)
                  if br >= 0:
                      c = c[:br+1] + call + c[br+1:]
              open(path, "w").write(c)
              print(f"  OK  {rel}")

          N, T = "\n", "\t"

          hook("fs/exec.c", "ksu_handle_execveat",
               "int do_execve(",
               f"{N}#ifdef CONFIG_KSU{N}extern int ksu_handle_execveat(int *fd, struct filename **fn, void *av, void *ev, int *fl);{N}#endif{N}",
               "struct user_arg_ptr envp = { .ptr.native = __envp };",
               f"{N}{T}#ifdef CONFIG_KSU{N}{T}ksu_handle_execveat((int *)AT_FDCWD, &filename, &argv, &envp, 0);{N}{T}#endif{N}")

          hook("fs/open.c", "ksu_handle_faccessat",
               "long do_faccessat(",
               f"{N}#ifdef CONFIG_KSU{N}extern int ksu_handle_faccessat(int *dfd, const char __user **fn, int *mode, int *fl);{N}#endif{N}",
               "unsigned int lookup_flags = LOOKUP_FOLLOW;",
               f"{N}{T}#ifdef CONFIG_KSU{N}{T}ksu_handle_faccessat(&dfd, &filename, &mode, NULL);{N}{T}#endif{N}")

          hook("fs/read_write.c", "ksu_handle_sys_read",
               "ssize_t vfs_read(",
               f"{N}#ifdef CONFIG_KSU{N}extern int ksu_handle_sys_read(unsigned int fd, char __user **buf, size_t *cnt);{N}#endif{N}",
               "if (!(file->f_mode & FMODE_READ))",
               f"{N}{T}#ifdef CONFIG_KSU{N}{T}ksu_handle_sys_read(0, NULL, NULL);{N}{T}#endif{N}")

          hook("fs/devpts/inode.c", "ksu_handle_devpts",
               "void *devpts_get_priv(",
               f"{N}#ifdef CONFIG_KSU{N}extern int ksu_handle_devpts(struct inode *);{N}#endif{N}",
               "if (dentry->d_sb->s_magic != DEVPTS_SUPER_MAGIC)",
               f"{N}{T}#ifdef CONFIG_KSU{N}{T}ksu_handle_devpts(dentry->d_inode);{N}{T}#endif{N}")

          hook("kernel/reboot.c", "ksu_handle_sys_reboot",
               "SYSCALL_DEFINE4(reboot,",
               f"{N}#ifdef CONFIG_KSU{N}extern int ksu_handle_sys_reboot(int m1, int m2, unsigned int cmd, void __user **arg);{N}#endif{N}",
               "int ret = 0;",
               f"{N}{T}#ifdef CONFIG_KSU{N}{T}ksu_handle_sys_reboot(magic1, magic2, cmd, &arg);{N}{T}#endif{N}")

          print("✅ KSU hooks done")
          'PYEOF'

      - name: Apply custom patches
        run: |
          PDIR="${{ github.workspace }}/garnet-scripts/patches"
          if [ -d "$PDIR" ] && ls "$PDIR"/*.patch 2>/dev/null; then
            cd kernel
            for p in "$PDIR"/*.patch; do
              patch -p1 --forward < "$p" && echo "OK: $(basename $p)" || echo "SKIP: $(basename $p)"
            done
          fi

      - name: Generate defconfig
        run: |
          cd kernel
          mkdir -p out
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang gki_defconfig

          # KernelSU + deshabilitar kprobes (hooks manuales activos)
          # Sin -d KPROBES el usuario puede activar Safe Mode con volumen abajo
          scripts/config --file out/.config -e KSU -e KSU_DEBUG -d KPROBES -d KPROBE_EVENTS

          # SUSFS v2.0.0
          scripts/config --file out/.config \
            -e KSU_SUSFS -e KSU_SUSFS_SUS_PATH -e KSU_SUSFS_SUS_MOUNT \
            -e KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT \
            -e KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT \
            -e KSU_SUSFS_SUS_KSTAT -e KSU_SUSFS_SUS_OVERLAYFS \
            -e KSU_SUSFS_TRY_UMOUNT -e KSU_SUSFS_SPOOF_UNAME \
            -e KSU_SUSFS_ENABLE_LOG -e KSU_SUSFS_OPEN_REDIRECT -e KSU_SUSFS_SUS_SU

          # Scheduler: WALT + EAS + uclamp (gaming boost UCLAMP_MIN=1024)
          scripts/config --file out/.config \
            -e SCHED_WALT -e SCHED_CORE_CTL -e CPU_BOOST \
            -e UCLAMP_TASK -e UCLAMP_TASK_GROUP --set-val UCLAMP_BUCKETS_COUNT 5 \
            -e ENERGY_MODEL \
            -e CPU_FREQ_GOV_SCHEDUTIL -e CPU_FREQ_GOV_PERFORMANCE -e CPU_FREQ_GOV_POWERSAVE \
            -d CPU_FREQ_GOV_ONDEMAND -d CPU_FREQ_GOV_CONSERVATIVE \
            -e CPU_IDLE -e CPU_IDLE_GOV_MENU -e ARM_PSCI_CPUIDLE

          # GPU Adreno 710
          scripts/config --file out/.config \
            -e DEVFREQ_GOV_SIMPLE_ONDEMAND -e DEVFREQ_GOV_PERFORMANCE

          # I/O Kyber — baja latencia para UFS 3.1
          scripts/config --file out/.config \
            -e MQ_IOSCHED_KYBER -e MQ_IOSCHED_DEADLINE -d IOSCHED_CFQ

          # zRAM + zstd
          scripts/config --file out/.config \
            -e ZRAM -e ZSMALLOC -e CRYPTO_LZ4 -e CRYPTO_ZSTD \
            -e ZRAM_DEF_COMP_ZSTD -e TRANSPARENT_HUGEPAGE -e TRANSPARENT_HUGEPAGE_MADVISE

          # TCP BBR — mejor throughput en 5G
          scripts/config --file out/.config \
            -e TCP_CONG_BBR -e NET_SCH_FQ -e NET_SCH_FQ_CODEL \
            --set-str DEFAULT_TCP_CONG bbr

          # Thin LTO
          if [ "${{ github.event.inputs.ENABLE_LTO }}" != "false" ]; then
            scripts/config --file out/.config -d LTO_NONE -e LTO_CLANG -e THINLTO
          fi

          # Security
          scripts/config --file out/.config \
            -e SECURITY_SELINUX -e SECURITY_SELINUX_BOOTPARAM \
            -d SECURITY_SELINUX_DEVELOP \
            -e RANDOMIZE_BASE -e RANDOMIZE_MODULE_REGION_FULL

          scripts/config --file out/.config --set-str LOCALVERSION "${{ env.LOCALVERSION }}"
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang olddefconfig

          echo "=== Key configs ==="
          grep -E "^CONFIG_(KSU|SUSFS|LTO|THINLTO|SCHED_WALT|UCLAMP|ZRAM|KYBER|BBR|KPROBES)" \
            out/.config || true

      - name: Build GarnetKernel
        run: |
          cd kernel
          BUILD_START=$(date +%s)
          echo "Build: $(date)"

          # KCFLAGS: -O3 -march=armv8.2-a SIN -mcpu específico
          # -mcpu=cortex-a78 con Neutron/AOSP Clang más nuevo → bootloop
          # Wild Kernel usa exactamente -march=armv8.2-a con Clang 12
          # -mtune=cortex-a55: optimiza para los cores eficientes (mayoría del tiempo de ejecución)
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC="ccache clang" \
            LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 \
            KCFLAGS="-O3 -march=armv8.2-a -mtune=cortex-a55 -Wno-error=frame-larger-than -Wno-error=unused-function" \
            KBUILD_BUILD_USER=Shammuray10 KBUILD_BUILD_HOST=GarnetKernel \
            2>&1 | tee out/build.log

          DIFF=$(( $(date +%s) - BUILD_START ))
          BUILD_TIME="$((DIFF/60))m $((DIFF%60))s"
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV

          [ ! -f out/arch/arm64/boot/Image ] && \
            echo "❌ BUILD FAILED" && tail -150 out/build.log && exit 1
          grep -q "LSE atomics not supported" out/build.log && \
            echo "❌ LSE atomics error — LLVM_IAS=1 no funcionó" && exit 1

          echo "✅ Build OK — $BUILD_TIME"
          ls -lh out/arch/arm64/boot/Image

      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 https://github.com/WildKernels/AnyKernel3.git anykernel
          rm -rf anykernel/.git

      - name: Package ZIP
        run: |
          cp kernel/out/arch/arm64/boot/Image anykernel/
          [ -f kernel/out/arch/arm64/boot/dtb.img  ] && \
            cp kernel/out/arch/arm64/boot/dtb.img  anykernel/ || true
          [ -f kernel/out/arch/arm64/boot/dtbo.img ] && \
            cp kernel/out/arch/arm64/boot/dtbo.img anykernel/ || true
          cp "${{ github.workspace }}/garnet-scripts/anykernel/anykernel.sh" anykernel/

          TIMESTAMP=$(date +%Y%m%d-%H%M)
          SUSFS_TAG="${{ env.SUSFS_VER }}"; [ -z "$SUSFS_TAG" ] && SUSFS_TAG="noSUSFS"
          ZIPNAME="${{ env.KERNEL_NAME }}-garnet-${TIMESTAMP}-KSU-${{ env.KSU_VER }}-SUSFS-${SUSFS_TAG}.zip"
          echo "ZIPNAME=$ZIPNAME" >> $GITHUB_ENV
          cd anykernel && zip -r9 "../$ZIPNAME" . -x "*.git*" -x "*placeholder" && cd ..
          echo "✅ ZIP: $ZIPNAME ($(du -h "$ZIPNAME" | cut -f1))"

      - name: Upload kernel ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIPNAME }}
          path: ${{ env.ZIPNAME }}
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: kernel/out/build.log
          retention-days: 7

      - name: Build Summary
        if: success()
        run: |
          echo "## ✅ GarnetKernel" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Device | Redmi Note 13 Pro 5G (2312DRA50G) |" >> $GITHUB_STEP_SUMMARY
          echo "| SoC | SM7435 — 4x A78@2.4GHz + 4x A55@1.95GHz |" >> $GITHUB_STEP_SUMMARY
        
