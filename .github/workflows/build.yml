name: GarnetKernel Build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      KERNEL_VERSION:
        description: 'Version string (e.g. v1.0)'
        required: false
        default: 'dev'
      ENABLE_LTO:
        description: 'Enable Thin LTO (true/false)'
        required: false
        default: 'true'
      ENABLE_SUSFS:
        description: 'Enable SUSFS (true/false)'
        required: false
        default: 'true'

env:
  # ── Kernel source ──────────────────────────────────────────
  # GKI android12-5.10 = misma base que Wild kernel 5.10.236
  # Funciona en HyperOS 3 / Android 16 en garnet (confirmado por Wild kernel)
  KERNEL_REPO: https://android.googlesource.com/kernel/common
  KERNEL_BRANCH: android12-5.10

  # ── KernelSU Next v3.2.0 ───────────────────────────────────
  KSU_TAG: v3.2.0

  # ── SUSFS v2.0.0 ───────────────────────────────────────────
  SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
  SUSFS_BRANCH: gki-android12-5.10

  # ── Toolchain ──────────────────────────────────────────────
  CLANG_DIR: /home/runner/neutron-clang

  # ── Build identity ─────────────────────────────────────────
  KERNEL_NAME: GarnetKernel
  LOCALVERSION: -GarnetKernel

jobs:
  build:
    name: Build GarnetKernel
    runs-on: ubuntu-24.04
    timeout-minutes: 150

    steps:

      # ── 1. Checkout repo ───────────────────────────────────
      - name: Checkout GarnetKernel repo
        uses: actions/checkout@v4
        with:
          path: garnet-scripts

      # ── 2. Dependencias ────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio flex \
            git kmod libelf-dev libssl-dev lld llvm python3 \
            zip curl wget ccache pahole zstd

      # ── 3. ccache ──────────────────────────────────────────
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 5G
          key: garnet-gki-${{ github.ref_name }}
          restore-keys: garnet-gki-

      # ── 4. Neutron Clang ───────────────────────────────────
      - name: Cache Neutron Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ env.CLANG_DIR }}
          key: neutron-clang-antman-v2

      - name: Download Neutron Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ env.CLANG_DIR }}
          cd ${{ env.CLANG_DIR }}
          curl -LO \
            "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman
          ./antman -S=latest
          echo "Clang version:"
          bin/clang --version

      - name: Export Clang to PATH
        run: |
          echo "${{ env.CLANG_DIR }}/bin" >> $GITHUB_PATH
          echo "CLANG_PATH=${{ env.CLANG_DIR }}" >> $GITHUB_ENV

      # ── 5. Kernel source GKI android12-5.10 ───────────────
      - name: Clone GKI kernel source
        run: |
          git clone --depth=1 \
            -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_REPO }} kernel
          cd kernel
          echo "KERNEL_HEAD=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "Source: $(git log --oneline -1)"

      # ── 6. KernelSU Next v3.2.0 ────────────────────────────
      - name: Integrate KernelSU Next v3.2.0
        run: |
          cd kernel
          curl -LSs \
            "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
            | bash -s ${{ env.KSU_TAG }}

          # Detectar directorio KSU (puede llamarse de distintas formas)
          KSU_DIR=""
          [ -d "KernelSU-Next" ] && KSU_DIR="KernelSU-Next"
          [ -d "KernelSU" ]      && KSU_DIR="KernelSU"

          if [ -n "$KSU_DIR" ]; then
            echo "KSU_VER=$(cat $KSU_DIR/VERSION 2>/dev/null || echo ${{ env.KSU_TAG }})" \
              >> $GITHUB_ENV
            echo "✅ KernelSU Next integrado: $KSU_DIR"
          else
            echo "❌ KernelSU no encontrado"
            exit 1
          fi

      # ── 7. SUSFS v2.0.0 ────────────────────────────────────
      - name: Clone SUSFS
        if: ${{ github.event.inputs.ENABLE_SUSFS != 'false' }}
        run: |
          git clone --depth=1 \
            -b ${{ env.SUSFS_BRANCH }} \
            ${{ env.SUSFS_REPO }} susfs
          echo "✅ SUSFS clonado rama ${{ env.SUSFS_BRANCH }}"

      - name: Apply SUSFS patch
        if: ${{ github.event.inputs.ENABLE_SUSFS != 'false' }}
        run: |
          cd kernel

          # Copiar archivos fuente de SUSFS
          cp ../susfs/kernel_patches/fs/susfs.c          fs/   2>/dev/null && echo "✓ susfs.c"
          cp ../susfs/kernel_patches/fs/sus_su.c         fs/   2>/dev/null && echo "✓ sus_su.c"
          cp ../susfs/kernel_patches/include/linux/susfs.h  include/linux/ 2>/dev/null && echo "✓ susfs.h"
          cp ../susfs/kernel_patches/include/linux/sus_su.h include/linux/ 2>/dev/null && echo "✓ sus_su.h"

          # Aplicar patch principal
          PATCH=$(find $GITHUB_WORKSPACE/susfs/kernel_patches/ \
                  -name "*android12*5.10*.patch" -o \
                  -name "*gki*5.10*.patch" 2>/dev/null | head -1)

          [ -z "$PATCH" ] && PATCH=$(find $GITHUB_WORKSPACE/susfs/kernel_patches/ \
                  -name "50_add_susfs*.patch" 2>/dev/null | head -1)

          if [ -f "$PATCH" ]; then
            patch -p1 --forward < "$PATCH" && \
              echo "✅ SUSFS patch aplicado" || \
              echo "⚠ SUSFS patch con conflictos menores — continuando"
          else
            echo "❌ Patch SUSFS no encontrado"
            ls $GITHUB_WORKSPACE/susfs/kernel_patches/
            exit 1
          fi

      # ── 8. Parches custom ──────────────────────────────────
      - name: Apply custom patches
        run: |
          cd kernel
          PDIR="${{ github.workspace }}/garnet-scripts/patches"
          if ls "$PDIR"/*.patch 2>/dev/null; then
            for p in "$PDIR"/*.patch; do
              patch -p1 --forward < "$p" && echo "✅ $(basename $p)" || \
                echo "⚠ $(basename $p) fallido o ya aplicado"
            done
          else
            echo "Sin parches custom — skipping"
          fi

      # ── 9. Defconfig + overlay de rendimiento ─────────────
      - name: Generate optimized defconfig
        run: |
          cd kernel
          mkdir -p out

          echo "=== Base: gki_defconfig ==="
          make O=out ARCH=arm64 gki_defconfig

          echo "=== Overlay GarnetKernel ==="

          # KernelSU Next
          scripts/config --file out/.config \
            -e KSU \
            -e KSU_DEBUG

          # SUSFS v2.0.0
          scripts/config --file out/.config \
            -e KSU_SUSFS \
            -e KSU_SUSFS_SUS_PATH \
            -e KSU_SUSFS_SUS_MOUNT \
            -e KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT \
            -e KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT \
            -e KSU_SUSFS_SUS_KSTAT \
            -e KSU_SUSFS_SUS_OVERLAYFS \
            -e KSU_SUSFS_TRY_UMOUNT \
            -e KSU_SUSFS_SPOOF_UNAME \
            -e KSU_SUSFS_ENABLE_LOG \
            -e KSU_SUSFS_OPEN_REDIRECT \
            -e KSU_SUSFS_SUS_SU

          # CPU / Scheduler
          scripts/config --file out/.config \
            -e SCHED_WALT \
            -e CPU_BOOST \
            -e SCHED_CORE_CTL \
            -e CPU_FREQ_GOV_SCHEDUTIL \
            -e CPU_FREQ_GOV_PERFORMANCE \
            -d CPU_FREQ_GOV_ONDEMAND \
            -d CPU_FREQ_GOV_CONSERVATIVE \
            -e ENERGY_MODEL \
            -e CPU_IDLE \
            -e CPU_IDLE_GOV_MENU \
            -e UCLAMP_TASK \
            -e UCLAMP_TASK_GROUP

          # I/O — Kyber para UFS 3.1
          scripts/config --file out/.config \
            -e MQ_IOSCHED_KYBER \
            -e MQ_IOSCHED_DEADLINE \
            -d IOSCHED_CFQ

          # Memoria / zRAM
          scripts/config --file out/.config \
            -e ZRAM \
            -e ZSMALLOC \
            -e CRYPTO_LZ4 \
            -e CRYPTO_ZSTD

          # TCP BBR
          scripts/config --file out/.config \
            -e TCP_CONG_BBR \
            -e NET_SCH_FQ

          # Thin LTO
          if [ "${{ github.event.inputs.ENABLE_LTO }}" != "false" ]; then
            scripts/config --file out/.config \
              -d LTO_NONE \
              -e LTO_CLANG \
              -e THINLTO
            echo "Thin LTO: ON"
          fi

          # Localversion
          scripts/config --file out/.config \
            --set-str LOCALVERSION "${{ env.LOCALVERSION }}"

          # Resolver dependencias
          yes "" | make O=out ARCH=arm64 oldconfig 2>/dev/null || \
          make O=out ARCH=arm64 olddefconfig

          echo "=== Defconfig listo ==="
          grep -E "^CONFIG_(KSU|SUSFS|THINLTO|SCHED_WALT|ZRAM|KYBER|BBR|UCLAMP)" \
            out/.config || true

      # ── 10. Compilar ───────────────────────────────────────
      - name: Build GarnetKernel
        run: |
          cd kernel
          echo "Build: $(date)"
          BUILD_START=$(date +%s)

          make -j$(nproc --all) \
            O=out \
            ARCH=arm64 \
            CC="ccache clang" \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            KCFLAGS="-O3 -march=armv8.2-a -mtune=cortex-a55 -Wno-error=frame-larger-than" \
            KBUILD_BUILD_USER=Shammuray10 \
            KBUILD_BUILD_HOST=GarnetKernel \
            2>&1 | tee out/build.log

          DIFF=$(( $(date +%s) - BUILD_START ))
          echo "BUILD_TIME=$((DIFF/60))m $((DIFF%60))s" >> $GITHUB_ENV

          if [ -f out/arch/arm64/boot/Image ]; then
            echo "✅ Image generado"
            ls -lh out/arch/arm64/boot/Image
          else
            echo "❌ BUILD FAILED"
            tail -80 out/build.log
            exit 1
          fi

      # ── 11. AnyKernel3 ─────────────────────────────────────
      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 \
            https://github.com/WildKernels/AnyKernel3.git anykernel
          rm -rf anykernel/.git

      - name: Package ZIP
        run: |
          cp kernel/out/arch/arm64/boot/Image anykernel/
          [ -f kernel/out/arch/arm64/boot/dtb.img  ] && \
            cp kernel/out/arch/arm64/boot/dtb.img  anykernel/ || true
          [ -f kernel/out/arch/arm64/boot/dtbo.img ] && \
            cp kernel/out/arch/arm64/boot/dtbo.img anykernel/ || true

          # anykernel.sh — igual que Wild kernel (funciona en garnet/HyperOS 3)
          cp "${{ github.workspace }}/garnet-scripts/anykernel/anykernel.sh" \
             anykernel/anykernel.sh

          TIMESTAMP=$(date +%Y%m%d-%H%M)
          ZIPNAME="${{ env.KERNEL_NAME }}-garnet-${TIMESTAMP}-KSUNext-${{ env.KSU_TAG }}-SUSFS-v2.0.0.zip"
          echo "ZIPNAME=$ZIPNAME" >> $GITHUB_ENV

          cd anykernel
          zip -r9 "../$ZIPNAME" . -x "*.git*" -x "*placeholder"
          cd ..
          ls -lh "$ZIPNAME"

      # ── 12. Upload ─────────────────────────────────────────
      - name: Upload kernel ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIPNAME }}
          path: ${{ env.ZIPNAME }}
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: kernel/out/build.log
          retention-days: 7

      # ── 13. Resumen ────────────────────────────────────────
      - name: Build summary
        if: success()
        run: |
          echo "## ✅ GarnetKernel Build OK" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Device | Redmi Note 13 Pro 5G (2312DRA50G) |" >> $GITHUB_STEP_SUMMARY
          echo "| Source | GKI ${{ env.KERNEL_BRANCH }} @ ${{ env.KERNEL_HEAD }} |" >> $GITHUB_STEP_SUMMARY
          echo "| KSU Next | ${{ env.KSU_TAG }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SUSFS | v2.0.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| Compiler | Neutron Clang + LLVM |" >> $GITHUB_STEP_SUMMARY
          echo "| KCFLAGS | -O3 -march=armv8.2-a -mtune=cortex-a55 |" >> $GITHUB_STEP_SUMMARY
          echo "| LTO | Thin LTO |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | ${{ env.BUILD_TIME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ZIP | ${{ env.ZIPNAME }} |" >> $GITHUB_STEP_SUMMARY
          
