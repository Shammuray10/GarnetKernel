name: GarnetKernel Build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ENABLE_LTO:
        description: 'Enable Thin LTO (true/false)'
        required: false
        default: 'true'
      ENABLE_SUSFS:
        description: 'Enable SUSFS (true/false)'
        required: false
        default: 'true'

env:
  KERNEL_REPO:   https://android.googlesource.com/kernel/common
  KERNEL_BRANCH: android12-5.10
  KSU_TAG:       v3.1.0
  SUSFS_REPO:    https://gitlab.com/simonpunk/susfs4ksu.git
  SUSFS_BRANCH:  gki-android12-5.10
  CLANG_DIR:     /home/runner/neutron-clang
  KERNEL_NAME:   GarnetKernel
  LOCALVERSION:  -GarnetKernel

jobs:
  build:
    name: Build GarnetKernel
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: garnet-scripts

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio flex \
            git kmod libelf-dev libssl-dev python3 \
            zip curl wget ccache pahole zstd \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 8G
          key: garnet-gki-clang18-${{ github.ref_name }}
          restore-keys: |
            garnet-gki-clang18-
            garnet-gki-

      - name: Cache Neutron Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ env.CLANG_DIR }}
          key: neutron-clang-antman-latest-v5

      - name: Download Neutron Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ env.CLANG_DIR }}
          cd ${{ env.CLANG_DIR }}
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman
          ./antman -S=latest
          bin/clang --version

      - name: Export Clang to PATH
        run: |
          echo "${{ env.CLANG_DIR }}/bin" >> $GITHUB_PATH
          echo "CLANG_PATH=${{ env.CLANG_DIR }}" >> $GITHUB_ENV
          clang --version

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_REPO }} kernel
          cd kernel
          KHEAD=$(git rev-parse --short HEAD)
          echo "KERNEL_HEAD=$KHEAD" >> $GITHUB_ENV
          echo "Source: $KHEAD"

      - name: Integrate KernelSU Next v3.1.0
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s ${{ env.KSU_TAG }}
          KSU_DIR=""
          [ -d "KernelSU-Next" ] && KSU_DIR="KernelSU-Next"
          [ -d "KernelSU" ]      && KSU_DIR="KernelSU"
          [ -z "$KSU_DIR" ] && echo "KSU dir not found" && exit 1
          KSU_VER=$(cat "$KSU_DIR/VERSION" 2>/dev/null || echo "${{ env.KSU_TAG }}")
          echo "KSU_VER=$KSU_VER" >> $GITHUB_ENV
          echo "KSU_DIR=$KSU_DIR" >> $GITHUB_ENV
          echo "KernelSU Next ($KSU_DIR) $KSU_VER integrated"

      - name: Clone SUSFS
        if: ${{ github.event.inputs.ENABLE_SUSFS != 'false' }}
        run: |
          git clone --depth=1 -b ${{ env.SUSFS_BRANCH }} ${{ env.SUSFS_REPO }} susfs
          SUSFS_VER=$(cat susfs/VERSION 2>/dev/null || echo "v2.0.0")
          echo "SUSFS_VER=$SUSFS_VER" >> $GITHUB_ENV

      - name: Apply SUSFS patch
        if: ${{ github.event.inputs.ENABLE_SUSFS != 'false' }}
        run: |
          cd kernel
          find "$GITHUB_WORKSPACE/susfs/kernel_patches/include/" -name "*.h" | while read f; do
            dest="include/$(echo "$f" | sed 's|.*include/||')"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
          done
          find "$GITHUB_WORKSPACE/susfs/kernel_patches/fs/" -name "*.c" | while read f; do
            cp "$f" "fs/"
          done
          PATCH=""
          for c in \
            "$GITHUB_WORKSPACE/susfs/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch" \
            "$GITHUB_WORKSPACE/susfs/kernel_patches/50_add_susfs_in_kernel-5.10.patch"; do
            [ -f "$c" ] && PATCH="$c" && break
          done
          [ -z "$PATCH" ] && PATCH=$(find "$GITHUB_WORKSPACE/susfs/kernel_patches/" -name "*5.10*.patch" | sort | head -1)
          [ -z "$PATCH" ] && echo "SUSFS patch not found" && exit 1
          patch -p1 --forward < "$PATCH" && echo "SUSFS applied" || {
            patch -p1 --forward --reject-file=/tmp/susfs.rej < "$PATCH" || true
            # Ignorar .rej si son solo "Reversed" (KSU bridge ya aplicado via patch principal)
            if find . -name "*.rej" | grep -q .; then
              if grep -q "FAILED" /tmp/susfs.rej 2>/dev/null; then
                cat /tmp/susfs.rej | head -40 && exit 1
              else
                echo "rej files are Reversed-only (already applied) — continuing"
              fi
            fi
            echo "SUSFS applied with minor conflicts"
          }
          KSU_PATCH=$(find "$GITHUB_WORKSPACE/susfs/kernel_patches/" \( -name "*ksu*" -o -name "*kernelsu*" \) | head -1)
          [ -f "$KSU_PATCH" ] && [ -n "$KSU_DIR" ] && \
            ( cd "$KSU_DIR" && patch -p1 --forward < "$KSU_PATCH" ) || true

      - name: Apply KSU manual hooks
        run: |
          python3 -c "
          import os, sys
          K = 'kernel'
          def hook(f, marker, before, decl, after_line, call):
              path = os.path.join(K, f)
              c = open(path).read()
              if marker in c:
                  print(f'  skip {f} (already hooked)')
                  return
              if before not in c:
                  print(f'  FAIL {f}: anchor not found')
                  sys.exit(1)
              c = c.replace(before, decl + before, 1)
              if after_line in c:
                  c = c.replace(after_line, after_line + call, 1)
              open(path, 'w').write(c)
              print(f'  ok {f}')

          hook('fs/exec.c', 'ksu_handle_execveat',
               'int do_execve(',
               '\n#ifdef CONFIG_KSU\nextern int ksu_handle_execveat(int *fd, struct filename **f, void *a, void *e, int *fl);\n#endif\n',
               'struct user_arg_ptr envp = { .ptr.native = __envp };',
               '\n\t#ifdef CONFIG_KSU\n\tksu_handle_execveat((int *)AT_FDCWD, &filename, &argv, &envp, 0);\n\t#endif\n')

          hook('fs/open.c', 'ksu_handle_faccessat',
               'long do_faccessat(',
               '\n#ifdef CONFIG_KSU\nextern int ksu_handle_faccessat(int *dfd, const char __user **fn, int *mode, int *flags);\n#endif\n',
               'unsigned int lookup_flags = LOOKUP_FOLLOW;',
               '\n\t#ifdef CONFIG_KSU\n\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);\n\t#endif\n')

          hook('fs/read_write.c', 'ksu_handle_sys_read',
               'ssize_t vfs_read(',
               '\n#ifdef CONFIG_KSU\nextern int ksu_handle_sys_read(unsigned int fd, char __user **buf, size_t *cnt);\n#endif\n',
               'if (!(file->f_mode & FMODE_READ))',
               '\n\t#ifdef CONFIG_KSU\n\tksu_handle_sys_read(0, NULL, NULL);\n\t#endif\n')

          hook('fs/devpts/inode.c', 'ksu_handle_devpts',
               'void *devpts_get_priv(',
               '\n#ifdef CONFIG_KSU\nextern int ksu_handle_devpts(struct inode *);\n#endif\n',
               'if (dentry->d_sb->s_magic != DEVPTS_SUPER_MAGIC)',
               '\n\t#ifdef CONFIG_KSU\n\tksu_handle_devpts(dentry->d_inode);\n\t#endif\n')

          hook('kernel/reboot.c', 'ksu_handle_sys_reboot',
               'SYSCALL_DEFINE4(reboot,',
               '\n#ifdef CONFIG_KSU\nextern int ksu_handle_sys_reboot(int m1, int m2, unsigned int cmd, void __user **arg);\n#endif\n',
               'int ret = 0;',
               '\n\t#ifdef CONFIG_KSU\n\tksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\n\t#endif\n')

          print('All hooks applied')
          "

      - name: Apply custom patches
        run: |
          PDIR="${{ github.workspace }}/garnet-scripts/patches"
          if [ -d "$PDIR" ] && ls "$PDIR"/*.patch 2>/dev/null; then
            cd kernel
            for p in "$PDIR"/*.patch; do
              patch -p1 --forward < "$p" && echo "ok: $(basename $p)" || echo "skip: $(basename $p)"
            done
          fi

      - name: Generate defconfig
        run: |
          cd kernel
          mkdir -p out
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang gki_defconfig
          scripts/config --file out/.config -e KSU -e KSU_DEBUG
          scripts/config --file out/.config \
            -e KSU_SUSFS -e KSU_SUSFS_SUS_PATH -e KSU_SUSFS_SUS_MOUNT \
            -e KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT \
            -e KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT \
            -e KSU_SUSFS_SUS_KSTAT -e KSU_SUSFS_SUS_OVERLAYFS \
            -e KSU_SUSFS_TRY_UMOUNT -e KSU_SUSFS_SPOOF_UNAME \
            -e KSU_SUSFS_ENABLE_LOG -e KSU_SUSFS_OPEN_REDIRECT -e KSU_SUSFS_SUS_SU
          scripts/config --file out/.config \
            -e SCHED_WALT -e SCHED_CORE_CTL -e CPU_BOOST \
            -e UCLAMP_TASK -e UCLAMP_TASK_GROUP --set-val UCLAMP_BUCKETS_COUNT 5 \
            -e ENERGY_MODEL \
            -e CPU_FREQ_GOV_SCHEDUTIL -e CPU_FREQ_GOV_PERFORMANCE -e CPU_FREQ_GOV_POWERSAVE \
            -d CPU_FREQ_GOV_ONDEMAND -d CPU_FREQ_GOV_CONSERVATIVE \
            -e CPU_IDLE -e CPU_IDLE_GOV_MENU -e ARM_PSCI_CPUIDLE
          scripts/config --file out/.config \
            -e DEVFREQ_GOV_SIMPLE_ONDEMAND -e DEVFREQ_GOV_PERFORMANCE
          scripts/config --file out/.config \
            -e MQ_IOSCHED_KYBER -e MQ_IOSCHED_DEADLINE -d IOSCHED_CFQ
          scripts/config --file out/.config \
            -e ZRAM -e ZSMALLOC -e CRYPTO_LZ4 -e CRYPTO_ZSTD -e ZRAM_DEF_COMP_ZSTD \
            -e TRANSPARENT_HUGEPAGE -e TRANSPARENT_HUGEPAGE_MADVISE
          scripts/config --file out/.config \
            -e TCP_CONG_BBR -e NET_SCH_FQ -e NET_SCH_FQ_CODEL --set-str DEFAULT_TCP_CONG bbr
          if [ "${{ github.event.inputs.ENABLE_LTO }}" != "false" ]; then
            scripts/config --file out/.config -d LTO_NONE -e LTO_CLANG -e THINLTO
          fi
          scripts/config --file out/.config \
            -e SECURITY_SELINUX -e SECURITY_SELINUX_BOOTPARAM -d SECURITY_SELINUX_DEVELOP \
            -e RANDOMIZE_BASE -e RANDOMIZE_MODULE_REGION_FULL
          scripts/config --file out/.config --set-str LOCALVERSION "${{ env.LOCALVERSION }}"
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang olddefconfig
          grep -E "^CONFIG_(KSU|SUSFS|LTO|THINLTO|SCHED_WALT|UCLAMP|ZRAM|KYBER|BBR)" out/.config || true

      - name: Build GarnetKernel
        run: |
          cd kernel
          BUILD_START=$(date +%s)
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC="ccache clang" LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 \
            KCFLAGS="-O3 -mcpu=cortex-a78 -mtune=cortex-a78 -march=armv8.2-a -Wno-error=frame-larger-than -Wno-error=unused-function" \
            KBUILD_BUILD_USER=Shammuray10 KBUILD_BUILD_HOST=GarnetKernel \
            2>&1 | tee out/build.log
          DIFF=$(( $(date +%s) - BUILD_START ))
          echo "BUILD_TIME=$((DIFF/60))m $((DIFF%60))s" >> $GITHUB_ENV
          [ ! -f out/arch/arm64/boot/Image ] && echo "BUILD FAILED" && tail -150 out/build.log && exit 1
          grep -q "LSE atomics not supported" out/build.log && echo "LSE atomics error" && exit 1
          echo "Build OK: $((DIFF/60))m $((DIFF%60))s"
          ls -lh out/arch/arm64/boot/Image

      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 https://github.com/WildKernels/AnyKernel3.git anykernel
          rm -rf anykernel/.git

      - name: Package ZIP
        run: |
          cp kernel/out/arch/arm64/boot/Image anykernel/
          [ -f kernel/out/arch/arm64/boot/dtb.img  ] && cp kernel/out/arch/arm64/boot/dtb.img  anykernel/ || true
          [ -f kernel/out/arch/arm64/boot/dtbo.img ] && cp kernel/out/arch/arm64/boot/dtbo.img anykernel/ || true
          cp "${{ github.workspace }}/garnet-scripts/anykernel/anykernel.sh" anykernel/
          TIMESTAMP=$(date +%Y%m%d-%H%M)
          SUSFS_TAG="${{ env.SUSFS_VER }}"; [ -z "$SUSFS_TAG" ] && SUSFS_TAG="noSUSFS"
          ZIPNAME="${{ env.KERNEL_NAME }}-garnet-${TIMESTAMP}-KSUNext-${{ env.KSU_VER }}-SUSFS-${SUSFS_TAG}.zip"
          echo "ZIPNAME=$ZIPNAME" >> $GITHUB_ENV
          cd anykernel && zip -r9 "../$ZIPNAME" . -x "*.git*" -x "*placeholder" && cd ..
          echo "ZIP: $ZIPNAME ($(du -h $ZIPNAME | cut -f1))"

      - name: Upload kernel ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIPNAME }}
          path: ${{ env.ZIPNAME }}
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: kernel/out/build.log
          retention-days: 7

      - name: Build Summary
        if: success()
        run: |
          echo "## GarnetKernel Build OK" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Device | Redmi Note 13 Pro 5G (2312DRA50G) |" >> $GITHUB_STEP_SUMMARY
          echo "| SoC | SM7435 Snapdragon 7s Gen 2 — ARMv8.2 |" >> $GITHUB_STEP_SUMMARY
          echo "| ROM | HyperOS 3 stock |" >> $GITHUB_STEP_SUMMARY
          echo "| Kernel | GKI ${{ env.KERNEL_BRANCH }} @ ${{ env.KERNEL_HEAD }} |" >> $GITHUB_STEP_SUMMARY
          echo "| KernelSU Next | ${{ env.KSU_VER }} + manual hooks |" >> $GITHUB_STEP_SUMMARY
          echo "| SUSFS | ${{ env.SUSFS_VER }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compiler | Neutron Clang 18 LLVM |" >> $GITHUB_STEP_SUMMARY
          echo "| KCFLAGS | -O3 -mcpu=cortex-a78 -march=armv8.2-a |" >> $GITHUB_STEP_SUMMARY
          echo "| Features | WALT uclamp Kyber BBR zstd ThinLTO |" >> $GITHUB_STEP_SUMMARY
          echo "| Build time | ${{ env.BUILD_TIME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ZIP | ${{ env.ZIPNAME }} |" >> $GITHUB_STEP_SUMMARY
          
